name: UACM-Egreso-Network
version: "2.0.0"

caliper:
  blockchain: fabric

channels:
  - channelName: canal-uacm
    contracts:
      - id: uacm-contract

organizations:
  - mspid: Org1MSP
    identities:
      certificates:
        - name: 'User1'
          clientPrivateKey:
            # CORREGIDO: de ../../ a ../
            path: '../fabric-samples/test-network/organizations/peerOrganizations/org1.example.com/users/User1@org1.example.com/msp/keystore/priv_sk'
          clientSignedCert:
            # CORREGIDO: de ../../ a ../
            path: '../fabric-samples/test-network/organizations/peerOrganizations/org1.example.com/users/User1@org1.example.com/msp/signcerts/User1@org1.example.com-cert.pem'
    peers:
      - endpoint: localhost:7051
        grpcOptions:
          ssl-target-name-override: peer0.org1.example.com
          grpc.keepalive_time_ms: 600000
        tlsCACerts:
          # CORREGIDO: de ../../ a ../
          path: '../fabric-samples/test-network/organizations/peerOrganizations/org1.example.com/peers/peer0.org1.example.com/tls/ca.crt'

  - mspid: Org2MSP
    identities:
      certificates:
        - name: 'User1'
          clientPrivateKey:
            path: '../fabric-samples/test-network/organizations/peerOrganizations/org2.example.com/users/User1@org2.example.com/msp/keystore/priv_sk'
          clientSignedCert:
            path: '../fabric-samples/test-network/organizations/peerOrganizations/org2.example.com/users/User1@org2.example.com/msp/signcerts/User1@org2.example.com-cert.pem'
    peers:
      - endpoint: localhost:9051
        grpcOptions:
          ssl-target-name-override: peer0.org2.example.com
        tlsCACerts:
          path: '../fabric-samples/test-network/organizations/peerOrganizations/org2.example.com/peers/peer0.org2.example.com/tls/ca.crt'

orderers:
  - endpoint: localhost:7050
    grpcOptions:
      ssl-target-name-override: orderer.example.com
    tlsCACerts:
      path: '../fabric-samples/test-network/organizations/ordererOrganizations/example.com/orderers/orderer.example.com/tls/ca.crt'